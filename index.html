      @layer base {
        .prose {
          @apply text-slate-600 leading-relaxed;

          @apply font-black tracking-tight text-slate-900 mt-6 mb-3;
        }

          @apply font-bold text-slate-900;
        }

        .prose-invert h1, .prose-invert h2, .prose-invert h3, .prose-invert h4 {

        }
        .prose-invert strong {
          @apply text-white font-bold;
        }
      }
    </style>

      }
    </script>
    <style>
